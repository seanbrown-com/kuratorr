[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py", "*_tests.py"]
addopts = "--strict-markers --disable-warnings"

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["legacy", "venv", ".venv", "**/migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]
