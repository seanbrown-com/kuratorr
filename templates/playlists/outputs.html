{% extends "base.html" %}
{% block content %}
<h1>Playlist output directories</h1>
<section class="card narrow"><form method="post">{% csrf_token %}{{ form.as_p }}<button>Add output directory</button></form></section>
<section class="card"><table><thead><tr><th>Path</th><th>Enabled</th></tr></thead><tbody>{% for root in roots %}<tr><td><code>{{ root.path }}</code></td><td>{{ root.enabled|yesno:"Yes,No" }}</td></tr>{% empty %}<tr><td colspan="2">No output directories. Playlists remain in the database only.</td></tr>{% endfor %}</tbody></table></section>
{% endblock %}
